<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | FullPanjur</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="preloader">
        <div class="loader-content">
            <img src="logo.png" alt="FullPanjur Logo" class="loader-logo">
            <div class="loader-bar"></div>
        </div>
    </div>

    <nav id="navbar">
        <div class="logo">
            <a href="index.html"><img src="logo.png" alt="FullPanjur Logo" class="glow-logo"></a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html#home">Anasayfa</a></li>
            <li><a href="hakkimizda.html">Hakkımızda</a></li>
            <li><a href="hizmetler.html">Hizmetler</a></li>
            <li><a href="iletisim.html">İletişim</a></li>
        </ul>
    </nav>

    <section class="page-content reveal active" style="padding-top: 180px; text-align: center;">
        <h2 style="color: var(--primary); font-size: 3rem; margin-bottom: 50px;">BİZE ULAŞIN</h2>
        
        <div class="footer-content" style="display: flex; justify-content: space-around; flex-wrap: wrap; max-width: 1200px; margin: 0 auto; padding: 0 20px;">
            <div class="contact-card" style="background: var(--light); padding: 40px; border-radius: 20px; border: 1px solid var(--primary); min-width: 300px; margin: 20px;">
                <i class="fas fa-phone" style="font-size: 2.5rem; color: var(--primary); margin-bottom: 20px;"></i>
                <h3>Telefon</h3>
                <p style="margin-top: 15px; font-size: 1.2rem;">+90 (212) 000 00 00</p>
            </div>

            <div class="contact-card" style="background: var(--light); padding: 40px; border-radius: 20px; border: 1px solid var(--primary); min-width: 300px; margin: 20px;">
                <i class="fas fa-envelope" style="font-size: 2.5rem; color: var(--primary); margin-bottom: 20px;"></i>
                <h3>E-Posta</h3>
                <p style="margin-top: 15px; font-size: 1.2rem;">info@fullpanjur.com</p>
            </div>

            <div class="contact-card" style="background: var(--light); padding: 40px; border-radius: 20px; border: 1px solid var(--primary); min-width: 300px; margin: 20px;">
                <i class="fas fa-map-marker-alt" style="font-size: 2.5rem; color: var(--primary); margin-bottom: 20px;"></i>
                <h3>Adres</h3>
                <p style="margin-top: 15px; font-size: 1.2rem;">İstanbul, Türkiye</p>
            </div>
        </div>
    </section>

    <footer style="margin-top: 100px;">
        <div class="footer-bottom">© 2026 FullPanjur | Tüm Hakları Saklıdır.</div>
    </footer>
